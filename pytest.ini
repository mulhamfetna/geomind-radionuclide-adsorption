[pytest]
# The suite mixes `from src.geomind...` (older modules) and `from geomind...` / `from app...`
# (newer ones), so both the repository root and src/ must be importable. Declaring them here
# means the suite runs identically under `pytest`, `python -m pytest`, and from any working
# directory — a reviewer should not need a magic invocation.
pythonpath = . src
testpaths = tests
addopts = -q
