  - id: F27
    severity: critical
    title: Varon's leaching companion paper provides a WITHIN-SAMPLE causal test - framework
      Al^IV concentration governs Sr K_D, and destroying it by leaching destroys sorption
    evidence: >-
      Batch-4 paper Varon et al., Open Ceramics 25 (2026) 100895,
      doi:10.1016/j.oceram.2025.100895 - the leaching companion to varon2025 (Cleaner
      Materials). Its 0 h data are IDENTICAL to varon2025 (verified: K-0.5-16 BET 72,
      AlIV 96.0%, KD 4100) and are NOT re-ingested; the 96 h water-leached state is new.
      Tables 3-4 give, for all 7 samples at 0 h and 96 h: BET, [AlIV]_exp (mmol/g),
      AlIV/V/VI %, full Q4(mAl) speciation, Sr KD and Qmax.
      RESULT: [AlIV] CONCENTRATION (mmol/g) is the strongest predictor of Sr KD:
      corr = +0.946 (n=7), rising to +0.986 excluding the barely-reacted outlier K-1.2-8
      (H2O/M2O=8, BET 15, Qmax 0.02). This beats AlIV% (+0.80), ARI (+0.77) and crushes
      BET (+0.19, or -0.24 without the outlier) and Si/Al (-0.84).
      THE CAUSAL TEST: leaching removes framework Al, and corr(Δ[AlIV], ΔKD) = +0.938 -
      the samples that lose the most framework Al on leaching lose the most sorption.
      K-0.5-16 loses 1.39 mmol/g AlIV and 2750 mL/g KD (largest of both); K-1.5-16 loses
      0.04 mmol/g AlIV and the least KD. This is the same sample losing capacity AS it
      loses exchange sites - close to a causal demonstration that tetrahedral Al^IV is
      the Sr exchange site, not merely a correlate.
    action: >-
      Ingested 7 NEW 96h-leached Sr KD rows via _from_varon_leached2026 (Pool A 126 ->
      133 rows / 12 sources), sorbent_name "... (leached 96h)" so they can never be
      pooled with the fresh varon2025 rows. The "Interplay..." PDF in the same batch is
      a confirmed DUPLICATE of varon2025 (skipped). Strengthens the project's central
      finding: framework Al predicts cation uptake, and this is the first WITHIN-SAMPLE
      (not just cross-sample) evidence for it. Note [AlIV] CONCENTRATION > AlIV% > ARI as
      the ranking - absolute exchange-site density beats the per-Si fraction.
    status: resolved

  - id: F28
