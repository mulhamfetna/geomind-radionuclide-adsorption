# =====================================================================
# FINDINGS
# =====================================================================
findings:
  - id: F1
    severity: critical
    title: Si_Al and Density transplanted from the GEOMIND paper
    evidence: >-
      9 of 11 unique Si_Al values match the paper's 10 samples exactly to 3 dp; all 10
      published density values appear; 91 of 92 mixes carry a single broadcast value;
      neither column exists in either upstream source file.
    action: Both columns dropped in clean.py. Must never be reinstated as features.
    status: resolved

  - id: F2
    severity: critical
    title: Dataset far smaller than 867 rows implies
    evidence: Only 92 distinct mix designs; Metakaolin constant zero; features have 2-6 unique values.
    action: Grouped CV by mix design is mandatory. Metakaolin dropped.
    status: resolved

  - id: F3
    severity: high
    title: Adsorption data has extensive internal duplication
    evidence: 24 Qmax_Cs rows contain only 16 distinct values; Qmax_Sr has 7 rows.
    action: Repeats flagged (not deleted) via cs/sr_value_repeated.
    status: resolved

  - id: F4
    severity: medium
    title: Redundancy and version disagreement
    evidence: CSV/XLSX byte-identical; 18 duplicate rows; v2 disagrees in 22 cells.
    action: CSV declared canonical; duplicates removed; v2 unresolved.
    status: partially_resolved

  - id: F5
    severity: low
    title: Metadata.csv is cp1256, not UTF-8
    action: Handled in the ingestion layer.
    status: resolved

  - id: F6
    severity: critical
    title: Feasibility_Ranges is mislabelled and anti-correlated with truth
    evidence: >-
      Rejects 7 of 9 feasible published samples, accepts the 1 infeasible.
      Its constants are verbatim from the retired tool at tag v1.0.0.
    action: Sheet not read. Provisional envelope used instead, flagged provisional=True.
    status: resolved_with_open_gap

  - id: F7
    severity: critical
    title: Compiled data failed source audit - 10 of 31 rows
    evidence: >-
      (a) 3 rows labelled Sr are Eu-152+154. (b) 4 Niu 2022 rows claim Langmuir Qmax
      from a paper tabulating none. (c) Na-MK misattributed from another paper.
      (d) K-MK is a verbatim copy of K-MKBFS - a sorbent that does not exist.
    action: Quarantined/relabelled/re-typed as named constants in code.
    status: resolved

  - id: F8
    severity: medium
    title: Unmined master sheets add nothing
    evidence: >-
      Adsorption_Isotherms and Cs_Isotherms duplicate Functional_Data with the same
      fabricated rows; only 3 new values, which are cobalt.
    action: Marked duplicate. Not ingested.
    status: resolved

  - id: F9
    severity: high
    title: Surface area does not predict CATION uptake
    evidence: >-
      Cation-only, per source - lin2026 -0.90 (n=4), xiang2021 -0.90 (n=5),
      oulu2026 -0.47 (n=21), tarnovsky2024 +0.22 (n=6, inconclusive).
      Pooled cations +0.08. Varon: BET +0.19 vs Al-IV +0.95.
    action: >-
      Al-IV is the candidate primary feature. NOTE - an earlier claim of "six datasets
      confirm a negative BET correlation" was an OVERSTATEMENT, corrected here.
    status: open

  - id: F10
    severity: high
    title: Pooling adsorbates flips the sign of the BET relationship
    evidence: cations corr(BET,capacity) = +0.08; dyes = +0.66.
    action: >-
      Never pool adsorbate classes. Dyes use surface area; cations use charge sites.
      pooling_warning() enforces the check.
    status: resolved

  - id: F11
    severity: high
    title: Sr_Immobilization_Mechanisms is untraceable and largely duplicated
    evidence: >-
      Audit 2026-07-20 - the ONLY master sheet with no Source column at all, plus
      66.7% internal duplication among its numeric cells. Same signature as the
      fabricated Na-MK/K-MK rows in F7.
    action: Relabelled FALSE / DISCARD in the warehouse. Not usable.
    status: resolved

  - id: F12
    severity: medium
    title: The v2 "conflict" was precision, not disagreement
    evidence: >-
      All 22 differing cells are Comp_Strength in rows 843-866 and differ only by
      rounding (34.36 vs 34.35777). N data.xls genuinely reports up to 6 dp, and 18
      of the 24 v2 values appear verbatim upstream. So v2 preserved source precision
      and Physical_Data rounded to 2 dp.
    action: >-
      Q1 closed. v2 status suspect -> verified. Physical_Data remains canonical;
      the difference (<=0.005 MPa) is immaterial for modelling.
    status: resolved

  - id: F13
    severity: medium
    title: Several context sheets cite papers we do not hold
    evidence: >-
      Audit 2026-07-20 - Kim_2026, Yildirim_2024 and Duque_Redondo_2023 are cited by
      Surface_Complexation_Sr, MD_Simulation_Sr_Cs, Zeolite_Comparison_Sr_Cs,
      Sr_Leaching_Data, EXAFS and XRD sheets. None are in papers/references.
      Surface_Complexation cites "Eq. (10)-(12)" - equations, not sources, so those
      rows are model output rather than measurement. FTIR is 88.9% duplicated,
      XRD 72.7%.
    action: >-
      All remain UNVERIFIED and excluded from modelling. Acquiring the three papers
      is the only way to promote them; recorded as Q6.
    update_2026_07_20: >-
      Kim 2026 IS held after all - it was on disk the whole time under a non-Latin
      filename ("papers/references/ذري 2.pdf"), which is why the earlier
      filename-based check missed it. Kim, B., Geddes, D.A., Kearney, S.A. et al.,
      Cement and Concrete Research 205 (2026) 108214, doi:10.1016/j.cemconres.2026.108214.
      Reading it does NOT clear the quarantine, and partly deepens it: the paper
      contains EXAFS (8 mentions) and XRD (15), so those two sheets are plausibly
      sourced - but it contains ZERO occurrences of "surface complexation" and ZERO
      of "molecular dynamics"/"MD simulation", while Surface_Complexation_Sr and
      MD_Simulation_Sr_Cs both cite Kim_2026 as their source. Either a different
      Kim 2026 is meant, or this is misattribution of the same class as F7.
      Both sheets stay quarantined; the EXAFS/XRD sheets are now checkable line by line.
    status: open

  - id: F14
    severity: high
    title: A high R2 Langmuir fit can leave Qmax essentially unconstrained
    evidence: >-
      Baek 2018 chabazite: Q0L = 1249.5 mg/g with K_L = 7.9e-05 L/mg and R2 = 0.99989,
      while the paper's own kinetics report equilibrium uptake of just 1.184 mg/g.
      K_L is two orders of magnitude below the other two zeolites in the same table.
      At low coverage the Langmuir isotherm is near-linear, so it fits almost perfectly
      while the plateau is extrapolated ~1000x beyond any measured point.
    action: >-
      Ingested but flagged - it exceeds the schema bound of 1000 mg/g and validate()
      reports it. Must be excluded from any fit unless the extrapolation is defended.
      Generalises: R2 is not evidence that a fitted Qmax is meaningful. Screen future
      Langmuir rows on K_L and on the measured concentration range, not R2 alone.
    status: open

  - id: F15
    severity: critical
    title: Fitted capacities cannot be validated - C0 was never captured
    evidence: >-
      Applying the F14 screen to all 35 fitted-isotherm rows: 32 of the 33 rows with a
      usable K_L have NO recorded initial concentration, so Langmuir saturation
      (theta = K*C0/(1+K*C0)) cannot be computed. The screen runs on exactly one row
      (GF600, theta = 0.93). Chabazite was caught only because its paper stated the
      equilibrium uptake in prose.
    action: >-
      initial_conc_mg_L made required for fitted-isotherm rows going forward; existing
      rows flagged c0_unknown. PROGRESS 2026-07-20: C0 recovered for Baek (2658 mg/L)
      and El-Naggar (1000 mg/L), taking screenable rows from 1 to 10 - of which 8 are
      sound, 1 borderline (stilbite, theta 0.775) and 1 a confirmed artifact
      (chabazite, theta 0.174). 25 rows still lack C0.
      COMPLETE 2026-07-20: C0 recovered for 7 sources; 29 of 35 rows now screenable.
      27 sound, 1 borderline (stilbite 0.775), 1 artifact (chabazite 0.174). Six rows
      remain unscreenable because their methods state no isotherm range.
      Lesson recorded THREE times: K_L alone is not a screen - saturation is
      K*C0/(1+K*C0), so a small K is compensated by a large C0. The same instinct would
      have discarded 19 sound rows.
    status: resolved_with_open_gap

  - id: F16
    severity: medium
    title: theta = 1 - R_L, so the saturation screen needs no C0
    evidence: >-
      The Langmuir separation factor R_L = 1/(1+b*C0) is reported by many papers as a
      favourability check. Our saturation measure theta = b*C0/(1+b*C0) is exactly
      1 - R_L. Verified against the independent C0 route on six El-Naggar rows: the
      two derivations agree to three decimals. Resolved Tian ESPR (theta 0.944 Cs,
      0.994 Sr) with back-calculated C0 5.25 and 9.77 mmol/L, matching the Fig. 5 axes.
    action: >-
      Use R_L as the PRIMARY screen and C0 recovery only as fallback. Found by
      rendering PDF figures and reading them visually - a capability previously and
      wrongly described as "manual figure reading" and deferred to Mulham.
    status: resolved

  - id: F17
    severity: high
