      %Cs released) = +0.826, while r(Si/Al, %Cs released) = +0.617 and r(Si/Al, %Sr released) = +0.376.
      This reproduces the authors own qualitative statement exactly: "Cs+ immobilisation is higher at
      lower Si/Al and Ca/(Si+Al) ratios. Immobilisation of Sr2+ is higher at a lower Ca/(Si+Al) ratio and
