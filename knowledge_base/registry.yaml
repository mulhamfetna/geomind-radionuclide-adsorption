      could be established between the BET values and the immobilisation capacities".'
    action: 'Three things at once. (1) It puts a NUMBER on the F38 mechanism: Ca2+ and Sr2+ are both
      alkaline earths competing for the same charge-balancing sites, so where Ca is abundant Sr cannot be
      retained - and the association is near-deterministic (r = +0.99). The split by nuclide is
      mechanistically coherent: Sr2+ is governed overwhelmingly by Ca competition, while Cs+ (monovalent,
      substituting for Na+) is governed more by framework Al availability via Si/Al. (2) The Si/Al
      direction agrees with our descriptor - lower Si/Al, i.e. MORE framework Al, retains better - now in
      an independent laboratory, a different material class and the immobilisation (not adsorption)
      regime. (3) It independently reproduces our BET null result. CAUTION, stated: this is a Ca-BEARING
      slag system, exactly the class F19/D12 excludes from the ARI descriptor domain; the rows carry
      ca_si_al explicitly and must not be pooled with the Ca-free framework gels. n=7 compositions, one
      laboratory, one protocol - strong within-study, not a cross-laboratory claim (F36).'
    status: resolved

