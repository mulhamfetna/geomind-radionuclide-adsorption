  - id: F24
    severity: critical
    title: Kurumisawa 2021 recovered - a rejected paper that bridges both pools - and
      it exposes a 12-order-of-magnitude naming collision in "diffusion coefficient"
    evidence: >-
      Kurumisawa 2021 (doi:10.1617/s11527-021-01758-y) was REJECTED during batch triage
      as "a diffusivity study (diffus 65)". Reading it inline shows that verdict was
      wrong on content:
      (a) Figure 3b publishes the Langmuir MONOLAYER Cs CAPACITY for five metakaolin
      geopolymers made with five different alkali activators (K11 0.315, K9 0.425,
      0.66K 0.530, N11 0.727, KN11 0.393 mmol/g) - a Pool A capacity WITH real
      compositional variation, which Pool A is short of. Pool A: 121 -> 126 rows.
      (b) Figure 2 publishes a Cs diffusivity for the same five specimens - Pool B.
      Pool B: 16 -> 26 rows.
      (c) THE COLLISION. Kurumisawa's is an INGRESS coefficient (Cs diffusing INTO an
      immersed specimen), reported in m2/s and of order 4e-12 m2/s = 4e-8 cm2/s.
      Kim's and Nevin's are ANSI/ANS 16.1 EFFECTIVE diffusivities (nuclide leaching OUT
      of a doped wasteform), of order 1e-16 and 1e-19 cm2/s. Same name, opposite
      experiment, TWELVE orders of magnitude apart.
      (d) Table 3 is the 29Si NMR of the ACTIVATOR SOLUTION (Q0-Q3 of the silicate),
      NOT of the hardened gel - so this paper supplies no framework Al^IV despite
      being NMR-bearing.
      (e) Applying the F14/F16 saturation screen to the recovered capacities:
      K11 theta 0.962 sound, KN11 0.847 sound, K9 0.704 borderline, 0.66K 0.608
      borderline, and N11 theta 0.499 an EXTRAPOLATION ARTEFACT - N11 being the
      HIGHEST reported capacity of the five.
    action: >-
      Both halves ingested through separate adapters under D13. RetentionType gains
      INGRESS_DIFFUSIVITY as a distinct member and pooling_warning() now raises an
      explicit CATEGORY ERROR if both diffusivity kinds appear together. N11 flagged as
      an artefact. All Kurumisawa rows carry from_figure=True.
      LESSON: the batch triage rejected this paper on keyword balance without reading
      it, and keyword balance cannot see a capacity that lives only in a figure. The
      other triage rejections should be re-read the same way - starting with
      J. Environ. Manage. 370 (2024).
    status: resolved

