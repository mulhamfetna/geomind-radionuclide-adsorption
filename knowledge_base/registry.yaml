# =====================================================================
# GEOMIND-R — UNIFIED KNOWLEDGE REGISTRY
#
# SINGLE SOURCE OF TRUTH. Every data asset, source, finding and decision
# in this project is registered here. Nothing may be used in analysis
# unless it appears below with an explicit `status` and `usage`.
#
# Rules:
#   1. New data       -> add an `assets:` entry BEFORE using it.
#   2. New paper      -> add a `sources:` entry with extraction status.
#   3. New finding    -> add a `findings:` entry with evidence + action.
#   4. New decision   -> add a `decisions:` entry with the reason.
#   5. Never widen a `usage` field without recording a decision.
#
# Regenerate the human-readable docs after any edit:
#   python -m src.geomind.kb
# =====================================================================

meta:
  project: GEOMIND-R
  updated: "2026-07-20"
  pool_rows: 121
  pool_sources: 9

# ---------------------------------------------------------------------
# STATUS VOCABULARY (closed set - the generator rejects anything else)
# ---------------------------------------------------------------------
status_vocab:
  verified: Checked in context against the primary source. Safe to use.
  partial: Some rows verified, others not. Use only the verified subset.
  suspect: Provenance unclear or contradicted. Do NOT use pending resolution.
  rejected: Proven wrong or unusable. Never use. Kept for the record.
  duplicate: Redundant copy of another asset. Use the canonical one instead.
  unmined: Present but never extracted. Unknown value.
  derived: Produced by our code from other assets. Not a measurement.
  external: Third-party bulk data, not committed to git.

