  - id: F19
    severity: high
    title: The Al-richness descriptor is valid only within a structural class, and the
      Oulu backfill does not widen its evidence base
    evidence: >-
      Backfilling ARI from F18 attached the descriptor to 39 pool rows / 12 sorbents.
      Split by structure, the 12 sorbents behave as two different materials.
      Ca-FREE (n=4, Q4 45-73%): ARI +0.932, framework-only ARI +0.940 - uptake spans
      2.13-11.53 mg/g (sd 3.98). Ca-BEARING (n=8, Q4 0-26%, Q0-Q2 dominated): ARI
      -0.108, Si/Al -0.135, Ca/Al -0.104, Q4% -0.247, BET +0.462 - NOTHING predicts,
      and uptake is nearly flat at 7.27 +/- 1.31 mg/g regardless of composition.
      Pooling all 12 gives ARI +0.536, a mediocre value that conceals two regimes.
      Ca acts as a network modifier: there is no condensed aluminosilicate framework
      for a framework descriptor to measure, and uptake proceeds by a different
      mechanism (C-A-S-H exchange), roughly composition-independent.
    action: >-
      Restrict the ARI claim to Q4-rich framework aluminosilicates and state the
      structural gate explicitly. Generalises F9 one level down: never pool ADSORBATE
      classes, and never pool SORBENT structural classes either. IMPORTANT correction
      to my own estimate - I projected this backfill would widen the descriptor to
      ~19 sorbents; in fact only 4 of the 12 lie in the regime where it applies, so
      the evidence base is unchanged at Varon n=7 (Sr) + Oulu n=4 (NH4+). Al^IV
      scarcity remains the binding constraint on M4/M5.
    status: resolved

  - id: F20
    severity: critical
    title: NMR characterisation and adsorption-capacity measurement are near-disjoint
      in this literature - Al^IV scarcity is structural, not a sampling accident
    evidence: >-
      Corpus-wide classification of all 30 PDFs by keyword balance (adsorption terms
      vs leaching/immobilisation terms) against NMR content. Of the 6 papers carrying
      substantial solid-state NMR, FOUR are immobilisation/wasteform studies
      (Nevin 2026 nmr=54, Kim 2026 nmr=66, Vettese 2025 nmr=33, Kurumisawa 2021 nmr=13),
      ONE is adsorption (Hossain/Oulu nmr=11, but NH4+ and dyes only - no Cs/Sr), and
      ONE is mixed (Varon 2025 nmr=32). Meanwhile ALL 13 papers classified as adsorption
      studies report ZERO solid-state NMR. Varon is the single bridge between the two -
      which is exactly why Al^IV occurs in precisely 7 pool rows, all from Varon.
      These are two different research communities: water-treatment groups measure
      isotherms and BET and never run MAS NMR; nuclear-wasteform groups run full
      29Si/27Al/133Cs NMR and measure leach rates and diffusivities, never isotherms.
    action: >-
      More scraping CANNOT fix Al^IV scarcity - the co-occurrence is rare by the
      structure of the field, not by chance, so Q7 has no answer within the adsorption
      literature. Two routes remain: (a) measure NMR ourselves on sorbents of known
      capacity, or (b) REFRAME the M4/M5 target property from adsorption capacity to
      leach resistance, where NMR is abundant. Note that route (b) reverses earlier
      triage - Kurumisawa 2021 and J. Environ. Manage. 370 (2024) were both REJECTED as
      "diffusivity/leaching studies", i.e. we discarded precisely the papers richest in
      the descriptor we need. The project aim ("immobilisation of Cs-137/Sr-90") is
      arguably better served by leach resistance than by adsorption capacity anyway;
      the two have been conflated. Decision required from PI - see reports/q7-descriptor-hunt-report.md.
    status: open

